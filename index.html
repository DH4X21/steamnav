let currentCat = 'all';

function getHeaderUrl(appId) {
  if (!appId) return null;
  return `img/${appId}.jpg`;
}

function getStoreUrl(appId, name) {
  if (appId) return `https://store.steampowered.com/app/${appId}`;
  return `https://store.steampowered.com/search/?term=${encodeURIComponent(name)}`;
}

function getCompareUrl(name) {
  return `https://www.cheapshark.com/search?q=${encodeURIComponent(name)}`;
}

function createCard(game) {
  const hotBadge = game.hot ? '<span class="hot-badge">🔥 HOT</span>' : '';
  const discountBadge = game.discount ? `<span class="discount-badge">${game.discount}</span>` : '';
  const tagsHtml = game.tags.map(t => `<span class="tag">${t}</span>`).join('');
  const stars = '★'.repeat(Math.round(game.rating)) + '☆'.repeat(5 - Math.round(game.rating));
  const priceClass = game.free ? 'price free' : 'price';
  const headerUrl = getHeaderUrl(game.appId);

  let coverHtml;
  if (headerUrl) {
    coverHtml = `
      <div class="cover-wrap">
        <div class="img-placeholder" id="ph_${game.appId}">${game.emoji}</div>
        <img class="cover" src="${headerUrl}" alt="${game.name}" loading="lazy"
          onload="document.getElementById('ph_${game.appId}').classList.add('hidden')"
          onerror="this.style.display='none'">
      </div>`;
  } else {
    coverHtml = `<div class="cover-wrap"><div class="img-placeholder">${game.emoji}</div></div>`;
  }

  const steamUrl = getStoreUrl(game.appId, game.name);
  const compareUrl = getCompareUrl(game.name);

  return `
    <div class="game-card" data-cat="${game.cat}" data-name="${game.name.toLowerCase()}">
      ${hotBadge}${discountBadge}
      ${coverHtml}
      <div class="info">
        <h3>${game.name}</h3>
        <div class="meta">
          <span class="${priceClass}">${game.price}</span>
          <span class="rating"><span>${stars}</span> ${game.rating}</span>
        </div>
        <div class="tags">${tagsHtml}</div>
        <div class="card-actions">
          <a class="steam-btn" href="${steamUrl}" target="_blank" onclick="event.stopPropagation()">🚀 Steam</a>
          <a class="compare-btn" href="${compareUrl}" target="_blank" onclick="event.stopPropagation()">💎 比价</a>
        </div>
      </div>
    </div>`;
}

function createRankItem(game, idx) {
  const numClass = idx === 0 ? 'rank-num top1' : idx === 1 ? 'rank-num top2' : idx === 2 ? 'rank-num top3' : 'rank-num';
  const thumb = game.appId
    ? `<img class="rank-thumb" src="img/${game.appId}.jpg" alt="${game.name}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="rank-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px">${game.emoji}</div>`;

  return `
    <div class="rank-item" onclick="window.open('${getStoreUrl(game.appId, game.name)}', '_blank')">
      <span class="${numClass}">${idx + 1}</span>
      <div class="rank-info">
        <div class="name">${game.name}</div>
        <div class="players">${game.players} 在线</div>
      </div>
      ${thumb}
    </div>`;
}

function renderGames() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const filter = g => {
    const catOk = currentCat === 'all' || g.cat === currentCat;
    const searchOk = !search || g.name.toLowerCase().includes(search) || g.tags.some(t => t.toLowerCase().includes(search));
    return catOk && searchOk;
  };

  const hot = GAMES.filter(g => filter(g) && g.hot);
  const newG = GAMES.filter(g => filter(g) && !g.hot && !g.free).slice(0, 8);
  const free = GAMES.filter(g => filter(g) && g.free);
  const emptyMsg = '<p style="color:var(--text-secondary);grid-column:1/-1;text-align:center;padding:32px">暂无匹配结果</p>';

  document.getElementById('hotGames').innerHTML = hot.length ? hot.map(createCard).join('') : emptyMsg;
  document.getElementById('newGames').innerHTML = newG.length ? newG.map(createCard).join('') : emptyMsg;
  document.getElementById('freeGames').innerHTML = free.length ? free.map(createCard).join('') : emptyMsg;

  // 侧栏排行
  const byPlayers = [...GAMES].sort((a, b) => parseFloat(b.players) - parseFloat(a.players)).slice(0, 8);
  document.getElementById('rankList').innerHTML = byPlayers.map((g, i) => createRankItem(g, i)).join('');

  const byRating = [...GAMES].sort((a, b) => b.rating - a.rating).slice(0, 8);
  document.getElementById('ratingList').innerHTML = byRating.map((g, i) => createRankItem(g, i)).join('');

  document.getElementById('totalCount').textContent = GAMES.length;
  document.getElementById('onlineCount').textContent = (2800 + Math.floor(Math.random() * 400));
}

function setCategory(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGames();
}

function filterGames() { renderGames(); }

function acceptCookies() {
  document.getElementById('cookieBar').classList.add('hidden');
  localStorage.setItem('cookies_accepted', 'true');
  // 启用 AdSense 广告追踪
  if (typeof gtag === 'function') {
    gtag('consent', 'update', { ad_storage: 'granted', analytics_storage: 'granted' });
  }
}

// 初始化
if (localStorage.getItem('cookies_accepted') === 'true') {
  document.getElementById('cookieBar').classList.add('hidden');
}

renderGames();
</script>
